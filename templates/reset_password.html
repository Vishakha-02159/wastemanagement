<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>

<div class="container">

    <div class="form-card">

        <h2>Reset Password</h2>

        <form method="POST">

            <input type="password"
                   name="new_password"
                   placeholder="New Password"
                   required>

            <input type="password"
                   name="confirm_password"
                   placeholder="Confirm Password"
                   required>

            <button type="submit">
                Update Password
            </button>

        </form>

    </div>

</div>

</body>
</html>
